name: Release APK

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  release:
    name: Build & Publish Release
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.9'

      - name: Generate Gradle wrapper
        run: gradle wrapper --gradle-version 8.9

      - name: Run unit tests
        run: ./gradlew testDebugUnitTest --stacktrace

      - name: Build debug APK
        run: ./gradlew assembleDebug --stacktrace

      - name: Rename APK with version
        run: |
          VERSION=${GITHUB_REF_NAME}
          cp app/build/outputs/apk/debug/app-debug.apk "FitTrack-${VERSION}.apk"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: FitTrack-*.apk
          generate_release_notes: true
          body: |
            ## FitTrack ${{ github.ref_name }}

            📱 **Instalación:** descarga el archivo `.apk` adjunto e instálalo en tu Android.
            Puede que necesites permitir "instalar apps de origen desconocido" en los ajustes del teléfono.
